<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            background: #0a0905;
            font-family: "DM Sans", sans-serif;
            min-height: 100vh;
            padding: 3rem
        }
    </style>
</head>

<body>
    <table style="width:100%;border-collapse:collapse;font-size:.88rem">
        <thead>
            <tr style="border-bottom:1px solid #1e1b12">
                <th
                    style="padding:12px 16px;text-align:left;font-family:Space Mono,monospace;font-size:.65rem;letter-spacing:.14em;color:#6b6452">
                    NAME</th>
                <th
                    style="padding:12px 16px;text-align:left;font-family:Space Mono,monospace;font-size:.65rem;letter-spacing:.14em;color:#6b6452">
                    ROLE</th>
                <th
                    style="padding:12px 16px;text-align:left;font-family:Space Mono,monospace;font-size:.65rem;letter-spacing:.14em;color:#6b6452">
                    STATUS</th>
                <th
                    style="padding:12px 16px;text-align:left;font-family:Space Mono,monospace;font-size:.65rem;letter-spacing:.14em;color:#6b6452">
                    REVENUE</th>
            </tr>
        </thead>
        <tbody>
            <tr style="background:rgba(255,255,255,.015);border-bottom:1px solid rgba(255,255,255,.04)">
                <td style="padding:13px 16px;color:#e8e2d0">Alice Johnson</td>
                <td style="padding:13px 16px;color:#6b6452">Designer</td>
                <td style="padding:13px 16px"><span style="color:#28c840;font-size:.78rem">Active</span></td>
                <td style="padding:13px 16px;color:#e8e2d0;font-family:Space Mono,monospace">$12,400</td>
            </tr>
            <tr style="background:;border-bottom:1px solid rgba(255,255,255,.04)">
                <td style="padding:13px 16px;color:#e8e2d0">Bob Martinez</td>
                <td style="padding:13px 16px;color:#6b6452">Developer</td>
                <td style="padding:13px 16px"><span style="color:#28c840;font-size:.78rem">Active</span></td>
                <td style="padding:13px 16px;color:#e8e2d0;font-family:Space Mono,monospace">$18,200</td>
            </tr>
            <tr style="background:rgba(255,255,255,.015);border-bottom:1px solid rgba(255,255,255,.04)">
                <td style="padding:13px 16px;color:#e8e2d0">Carol White</td>
                <td style="padding:13px 16px;color:#6b6452">Manager</td>
                <td style="padding:13px 16px"><span style="color:#e8820a;font-size:.78rem">Away</span></td>
                <td style="padding:13px 16px;color:#e8e2d0;font-family:Space Mono,monospace">$22,800</td>
            </tr>
            <tr style="background:;border-bottom:1px solid rgba(255,255,255,.04)">
                <td style="padding:13px 16px;color:#e8e2d0">Dan Kim</td>
                <td style="padding:13px 16px;color:#6b6452">Designer</td>
                <td style="padding:13px 16px"><span style="color:#4a4030;font-size:.78rem">Inactive</span></td>
                <td style="padding:13px 16px;color:#e8e2d0;font-family:Space Mono,monospace">$9,600</td>
            </tr>
            <tr style="background:rgba(255,255,255,.015);border-bottom:1px solid rgba(255,255,255,.04)">
                <td style="padding:13px 16px;color:#e8e2d0">Eva Chen</td>
                <td style="padding:13px 16px;color:#6b6452">Developer</td>
                <td style="padding:13px 16px"><span style="color:#28c840;font-size:.78rem">Active</span></td>
                <td style="padding:13px 16px;color:#e8e2d0;font-family:Space Mono,monospace">$16,500</td>
            </tr>
        </tbody>
    </table>
</body>

</html>
