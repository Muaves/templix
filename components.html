<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Templix — Components</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet">
    <meta name="title" content="Templix. ">
    <meta name="description"
    content="This is Templix. A simple copy-paste HTML, CSS, JS template library for FREE forever. Please check it out!">
  <meta name="keywords" content="templates, free, copy-paste">
  <meta name="robots" content="index, follow">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="language" content="English">
  <meta name="revisit-after" content="2 days">
  <meta name="author" content="Muaves">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #0a0905;
      --card: #111009;
      --border: #1e1b12;
      --orange: #e8820a;
      --ol: #f5a832;
      --text: #e8e2d0;
      --muted: #6b6452;
      --sw: 248px
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      min-height: 100vh;
      overflow-x: hidden
    }

    a {
      text-decoration: none;
      color: inherit
    }

    .sidebar {
      width: var(--sw);
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      padding: 1.25rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 1.8rem;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto
    }

    .sidebar::-webkit-scrollbar {
      width: 3px
    }

    .sidebar::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px
    }

    .s-logo {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: .92rem;
      color: var(--text);
      letter-spacing: .06em;
      display: block
    }

    .s-logo span {
      color: var(--orange)
    }

    .s-section-title {
      font-family: 'Space Mono', monospace;
      font-size: .56rem;
      letter-spacing: .2em;
      color: var(--muted);
      padding: .2rem .5rem;
      margin-bottom: .25rem
    }

    .cat-list {
      display: flex;
      flex-direction: column;
      gap: .1rem
    }

    .cat-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .5rem .65rem;
      border-radius: 8px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: .83rem;
      cursor: pointer;
      transition: all .14s;
      text-align: left;
      width: 100%
    }

    .badge-new {
      background: rgba(232, 130, 10, 0.15);
      border: 1px solid rgba(232, 130, 10, 0.3);
      color: var(--orange);
      font-size: 0.55rem;
      border-radius: 3px;
      padding: 1px 5px;
      margin-left: 5px;
      vertical-align: middle;
      font-family: 'Space Mono', monospace
    }

    .cat-btn:hover {
      background: rgba(255, 255, 255, .04);
      color: var(--text)
    }

    .cat-btn.active {
      background: rgba(232, 130, 10, .09);
      border-color: rgba(232, 130, 10, .2);
      color: var(--orange)
    }

    .cat-btn-inner {
      display: flex;
      align-items: center;
      gap: .55rem
    }

    .cat-btn svg {
      opacity: .5;
      flex-shrink: 0
    }

    .cat-btn.active svg,
    .cat-btn:hover svg {
      opacity: 1
    }

    .cat-count {
      font-size: .65rem;
      font-family: 'Space Mono', monospace;
      opacity: .55;
      color: var(--muted)
    }

    .cat-btn.active .cat-count {
      color: var(--orange);
      opacity: .8
    }

    .color-btns {
      display: flex;
      flex-direction: column;
      gap: .1rem
    }

    .color-btn {
      display: flex;
      align-items: center;
      gap: .55rem;
      padding: .5rem .65rem;
      border-radius: 8px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: .83rem;
      cursor: pointer;
      transition: all .14s;
      text-align: left;
      width: 100%
    }

    .color-btn:hover {
      background: rgba(255, 255, 255, .04);
      color: var(--text)
    }

    .color-btn.active {
      background: rgba(232, 130, 10, .09);
      border-color: rgba(232, 130, 10, .2);
      color: var(--text)
    }

    .swatch {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      flex-shrink: 0;
      border: 1px solid rgba(255, 255, 255, .08)
    }

    .dl-btn {
      display: flex;
      align-items: center;
      gap: .5rem;
      width: 100%;
      padding: .65rem .8rem;
      background: rgba(232, 130, 10, .09);
      border: 1px solid rgba(232, 130, 10, .22);
      border-radius: 9px;
      color: var(--orange);
      font-family: 'DM Sans', sans-serif;
      font-size: .82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s
    }

    .dl-btn:hover {
      background: rgba(232, 130, 10, .17);
      border-color: rgba(232, 130, 10, .42)
    }

    .main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .8rem;
      padding: .85rem 1.8rem;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(10, 9, 5, .97);
      backdrop-filter: blur(14px);
      z-index: 100;
      flex-wrap: wrap
    }

    .tb-left {
      display: flex;
      align-items: center;
      gap: .8rem;
      flex-wrap: wrap
    }

    .tb-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      color: var(--text);
      letter-spacing: .03em
    }

    .tb-count {
      font-size: .76rem;
      color: var(--muted);
      font-family: 'Space Mono', monospace
    }

    .tb-right {
      display: flex;
      align-items: center;
      gap: .6rem;
      flex-wrap: wrap
    }

    .back-link {
      display: flex;
      align-items: center;
      gap: .35rem;
      color: var(--muted);
      font-size: .8rem;
      transition: color .15s
    }

    .back-link:hover {
      color: var(--text)
    }

    .search-wrap {
      position: relative
    }

    .search-wrap svg {
      position: absolute;
      left: .75rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none
    }

    .search-field {
      background: rgba(255, 255, 255, .05);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .5rem .85rem .5rem 2.25rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: .83rem;
      outline: none;
      width: 200px;
      transition: border-color .15s
    }

    .search-field:focus {
      border-color: rgba(232, 130, 10, .4)
    }

    .search-field::placeholder {
      color: var(--muted)
    }

    .topbar-dl {
      display: flex;
      align-items: center;
      gap: .35rem;
      background: var(--orange);
      color: #000;
      border: none;
      border-radius: 7px;
      padding: .5rem 1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: .8rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s;
      text-decoration: none;
      white-space: nowrap
    }

    .topbar-dl:hover {
      background: var(--ol)
    }

    .content {
      padding: 1.8rem;
      flex: 1
    }

    .cat-section {
      margin-bottom: 3.5rem
    }

    .cat-section-head {
      display: flex;
      align-items: baseline;
      gap: .9rem;
      margin-bottom: 1.2rem;
      padding-bottom: .9rem;
      border-bottom: 1px solid var(--border)
    }

    .cat-section-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      color: var(--text)
    }

    .cat-section-count {
      font-size: .72rem;
      color: var(--muted);
      font-family: 'Space Mono', monospace
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.1rem
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color .2s, transform .2s;
      display: block
    }

    .card:hover {
      border-color: rgba(232, 130, 10, .32);
      transform: translateY(-3px)
    }

    .card-preview {
      height: 175px;
      position: relative;
      overflow: hidden;
      background: #0d0b07
    }

    .card-preview iframe {
      width: 200%;
      height: 200%;
      transform: scale(.5);
      transform-origin: 0 0;
      pointer-events: none;
      border: none;
      position: absolute;
      top: 0;
      left: 0
    }

    .card-overlay {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity .18s;
      background: rgba(0, 0, 0, .62);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      z-index: 2
    }

    .card:hover .card-overlay {
      opacity: 1
    }

    .ov-row {
      display: flex;
      gap: .5rem
    }

    .ov-btn {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      background: var(--orange);
      color: #000;
      border: none;
      border-radius: 7px;
      padding: 6px 14px;
      font-size: .76rem;
      font-weight: 700;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: background .14s;
      white-space: nowrap
    }

    .ov-btn:hover {
      background: var(--ol)
    }

    .ov-btn.ghost {
      background: rgba(255, 255, 255, .14);
      color: var(--text)
    }

    .ov-btn.ghost:hover {
      background: rgba(255, 255, 255, .24)
    }

    .ov-btn.copied {
      background: rgba(40, 200, 64, .22);
      color: #28c840
    }

    .ov-desc {
      font-size: .72rem;
      color: rgba(255, 255, 255, .55);
      text-align: center;
      max-width: 85%;
      line-height: 1.45;
      padding: 0 .5rem
    }

    .card-info {
      padding: .85rem .95rem
    }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: .3rem
    }

    .card-cat-lbl {
      font-size: .58rem;
      letter-spacing: .16em;
      color: var(--orange);
      font-family: 'Space Mono', monospace
    }

    .card-name {
      font-size: .9rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: .5rem
    }

    .card-tags {
      display: flex;
      gap: .3rem;
      flex-wrap: wrap
    }

    .tag {
      background: #1a1710;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: .15rem .45rem;
      font-size: .62rem;
      color: var(--muted);
      font-family: 'Space Mono', monospace
    }

    .empty-state {
      text-align: center;
      padding: 5rem 2rem;
      color: var(--muted)
    }

    .empty-state h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem; class="cat-btn"
      color: var(--text);
      margin-bottom: .5rem
    }

    .toast {
      position: fixed;
      bottom: 1.8rem;
      right: 1.8rem;
      background: #111009;
      border: 1px solid rgba(40, 200, 64, .28);
      border-radius: 12px;
      padding: .9rem 1.4rem;
      display: flex;
      align-items: center;
      gap: .7rem;
      z-index: 500;
      transform: translateY(16px);
      opacity: 0;
      transition: all .22s ease;
      pointer-events: none
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1
    }

    .toast-check {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(40, 200, 64, .12);
      border: 1.5px solid #28c840;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0
    }

    .toast-text {
      font-size: .84rem;
      color: var(--text);
      font-weight: 500
    }

    .toast-sub {
      font-size: .68rem;
      color: var(--muted);
      margin-top: .1rem
    }

    @media(max-width:680px) {
      .sidebar {
        display: none
      }

      .topbar {
        padding: .7rem 1rem
      }

      .content {
        padding: 1rem
      }
    }
  </style>
</head>

<body>

  <div class="toast" id="toast">
    <div class="toast-check"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#28c840"
        stroke-width="2.5">
        <polyline points="20 6 9 17 4 12" />
      </svg></div>
    <div>
      <div class="toast-text">Copied!</div>
      <div class="toast-sub" id="toastSub"></div>
    </div>
  </div>

  <aside class="sidebar">
    <a href="https://templix.muaves.com/" class="s-logo">Templix<span>.</span></a>

    <div>
      <div class="s-section-title">CATEGORIES</div>
      <div class="cat-list" id="catList"></div>
    </div>

    <div>
      <div class="s-section-title">THEME</div>
      <div class="color-btns" id="colorBtns">
        <button class="color-btn active" data-color="all">
          <span class="swatch" style="background:linear-gradient(135deg,#111 50%,#f5f0e8 50%)"></span>All themes
        </button>
        <button class="color-btn" data-color="dark">
          <span class="swatch" style="background:#111009"></span>Dark
        </button>
        <button class="color-btn" data-color="light">
          <span class="swatch" style="background:#f5f0e8"></span>Light
        </button>
      </div>
    </div>

    <div style="margin-top:auto;display:flex;flex-direction:column;gap:.5rem">
      <a href="docs/index.html"
        class="cat-btn"
        style="display:flex;align-items:center;gap:.55rem;padding:.5rem .65rem;border-radius:8px;color:var(--muted);font-size:.83rem;background:transparent;border:1px solid transparent;transition:all .14s">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" />
          <polyline points="14 2 14 8 20 8" />
        </svg>
        Docs <span class="badge-new">NEW</span>
      </a>
      <div class=""></div>
      <a href="tools/color-grabber.html" class="cat-btn"
        style="display:flex;align-items:center;gap:.55rem;padding:.5rem .65rem;border-radius:8px;color:var(--muted);font-size:.83rem;background:transparent;border:1px solid transparent;transition:all .14s">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10" />
          <path d="M9 12l2 2 4-4" />
        </svg>
        Tools <span class="badge-new">NEW</span>
      </a>
      <button class="dl-btn" id="dlBtn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" />
          <polyline points="7 10 12 15 17 10" />
          <line x1="12" y1="15" x2="12" y2="3" />
        </svg>
        Download .zip
      </button>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="tb-left">
        <a href="https://templix.muaves.com/" class="back-link">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 5l-7 7 7 7" />
          </svg>
          Home
        </a>
        <div class="tb-title">COMPONENTS</div>
        <div class="tb-count" id="tbCount">— templates</div>
      </div>
      <div class="tb-right">
        <div class="search-wrap">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
          <input class="search-field" id="searchField" type="text" placeholder="Search..." autocomplete="off">
        </div>
        <a href="Templix.zip" download class="topbar-dl">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" />
            <polyline points="7 10 12 15 17 10" />
            <line x1="12" y1="15" x2="12" y2="3" />
          </svg>
          Download .zip
        </a>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>

  <script src="assets/templates.js"></script>
  <script>
    var state = { cat: 'all', color: 'all', q: '' };
    var CAT_ICONS = {
      navbars: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/></svg>',
      heroes: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/></svg>',
      footers: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="20" x2="21" y2="20"/><path d="M5 20V8l7-5 7 5v12"/></svg>',
      modals: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/></svg>',
      tables: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/></svg>',
      galleries: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>',
      pricing: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>',
      sidebars: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/></svg>',
    };

    function buildCatList() {
      var total = Object.keys(REGISTRY).reduce(function (a, k) { return a + REGISTRY[k].length; }, 0);
      var html = '<button class="cat-btn active" data-cat="all"><span class="cat-btn-inner"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>All</span><span class="cat-count">' + total + '</span></button>';
      Object.keys(CATS).forEach(function (k) {
        html += '<button class="cat-btn" data-cat="' + k + '"><span class="cat-btn-inner">' + CAT_ICONS[k] + CATS[k] + '</span><span class="cat-count">' + REGISTRY[k].length + '</span></button>';
      });
      document.getElementById('catList').innerHTML = html;
      document.querySelectorAll('.cat-btn').forEach(function (b) {
        b.addEventListener('click', function () {
          document.querySelectorAll('.cat-btn').forEach(function (x) { x.classList.remove('active'); });
          b.classList.add('active');
          state.cat = b.dataset.cat;
          render();
        });
      });
    }

    document.getElementById('colorBtns').addEventListener('click', function (e) {
      var t = e.target.closest('[data-color]'); if (!t) return;
      document.querySelectorAll('.color-btn').forEach(function (b) { b.classList.remove('active'); });
      t.classList.add('active');
      state.color = t.dataset.color;
      render();
    });

    document.getElementById('searchField').addEventListener('input', function () {
      state.q = this.value.trim();
      render();
    });

    function matches(tpl) {
      if (state.color !== 'all' && !tpl.tags.includes(state.color)) return false;
      if (state.q) { var q = state.q.toLowerCase(); if (!tpl.name.toLowerCase().includes(q) && !tpl.tags.some(function (t) { return t.includes(q); })) return false; }
      return true;
    }

    var toastTimer;
    function showToast(name) {
      document.getElementById('toastSub').textContent = name;
      var t = document.getElementById('toast');
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function () { t.classList.remove('show'); }, 2100);
    }

    function copyTpl(id, btn) {
      var cats = Object.keys(REGISTRY); var tpl = null;
      for (var i = 0; i < cats.length; i++) { for (var j = 0; j < REGISTRY[cats[i]].length; j++) { if (REGISTRY[cats[i]][j].id === id) { tpl = REGISTRY[cats[i]][j]; break; } } if (tpl) break; }
      if (!tpl) return;
      fetch(tpl.file).then(function (r) { return r.text(); }).then(function (src) {
        navigator.clipboard.writeText(src).then(function () {
          var orig = btn.innerHTML;
          btn.classList.add('copied');
          btn.innerHTML = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Copied!';
          showToast(tpl.name);
          setTimeout(function () { btn.classList.remove('copied'); btn.innerHTML = orig; }, 1800);
        });
      });
    }

    function render() {
      var catsToShow = state.cat === 'all' ? Object.keys(REGISTRY) : [state.cat];
      var total = 0; var html = '';
      catsToShow.forEach(function (cat) {
        var items = REGISTRY[cat].filter(matches);
        if (!items.length) return;
        total += items.length;
        html += '<div class="cat-section" id="' + cat + '">';
        html += '<div class="cat-section-head"><div class="cat-section-name">' + CATS[cat] + '</div><div class="cat-section-count">' + items.length + ' template' + (items.length !== 1 ? 's' : '') + '</div></div>';
        html += '<div class="grid">';
        items.forEach(function (tpl) {
          var tags = tpl.tags.map(function (t) { return '<span class="tag">' + t + '</span>'; }).join('');
          var desc = tpl.desc ? '<div class="ov-desc">' + tpl.desc + '</div>' : '';
          html += '<div class="card" onclick="window.location=\'viewer.html?id=' + tpl.id + '\'">';
          html += '<div class="card-preview">';
          html += '<iframe src="' + tpl.file + '" loading="lazy" title="' + tpl.name + '"></iframe>';
          html += '<div class="card-overlay">';
          html += desc;
          html += '<div class="ov-row">';
          html += '<button class="ov-btn" onclick="event.stopPropagation();window.location=\'viewer.html?id=' + tpl.id + '\'">';
          html += '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg> Preview</button>';
          html += '<button class="ov-btn ghost" onclick="event.stopPropagation();copyTpl(\'' + tpl.id + '\',this)">';
          html += '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy</button>';
          html += '</div></div></div>';
          html += '<div class="card-info"><div class="card-meta"><span class="card-cat-lbl">' + cat.toUpperCase() + '</span></div><div class="card-name">' + tpl.name + '</div><div class="card-tags">' + tags + '</div></div>';
          html += '</div>';
        });
        html += '</div></div>';
      });
      if (!total) html = '<div class="empty-state"><h3>No results</h3><p>Try adjusting your filters or search term.</p></div>';
      document.getElementById('content').innerHTML = html;
      document.getElementById('tbCount').textContent = total + ' template' + (total !== 1 ? 's' : '');
    }

    document.getElementById('dlBtn').addEventListener('click', function () {
      var a = document.createElement('a'); a.href = 'Templix.zip'; a.download = 'Templix.zip'; a.click();
    });

    var hash = location.hash.replace('#', '');
    if (hash && REGISTRY[hash]) { state.cat = hash; }
    buildCatList();
    render();
    if (hash && REGISTRY[hash]) {
      document.querySelectorAll('.cat-btn').forEach(function (b) { b.classList.toggle('active', b.dataset.cat === hash); });
      setTimeout(function () { var el = document.getElementById(hash); if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 300);
    }
  </script>
</body>

</html>
