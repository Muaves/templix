<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            background: #0d0b07;
            font-family: "DM Sans", sans-serif;
            min-height: 100vh;
        }
    </style>
</head>

<body>
    <div style="height:200px"></div>
    <footer style="background:#0d0b07;padding:2.5rem 3rem">
        <div
            style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:2.5rem;text-align:center;max-width:560px;margin:0 auto">
            <h3 style="font-size:1.2rem;font-weight:600;color:#e8e2d0;margin-bottom:.6rem">Ready to build something
                great?</h3>
            <p style="font-size:.88rem;color:#6b6452;margin-bottom:1.8rem;line-height:1.65">Join 50k+ developers using
                Templix.</p>
            <div style="display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap;margin-bottom:2.5rem"><button
                    style="background:#e8820a;color:#000;border:none;border-radius:8px;padding:10px 22px;font-size:.88rem;font-weight:700;cursor:pointer">Get
                    Started Free</button><button
                    style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#e8e2d0;border-radius:8px;padding:10px 22px;font-size:.88rem;cursor:pointer">View
                    Components</button></div><span style="font-size:.75rem;color:rgba(255,255,255,.15)">2024
                Templix</span>
        </div>
    </footer>
</body>

</html>
