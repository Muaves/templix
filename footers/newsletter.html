<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            background: #0d0b07;
            font-family: "DM Sans", sans-serif;
            min-height: 100vh;
        }
    </style>
</head>

<body>
    <div style="height:180px"></div>
    <footer style="background:#0d0b07;border-top:1px solid #1e1b12;padding:2.5rem 3rem">
        <div
            style="display:flex;justify-content:space-between;align-items:flex-start;gap:2rem;flex-wrap:wrap;margin-bottom:2rem">
            <div>
                <h3 style="color:#e8e2d0;font-size:1.1rem;font-weight:600;margin-bottom:.4rem">Stay in the loop.</h3>
                <p style="color:#6b6452;font-size:.85rem">No spam, just the good stuff.</p>
            </div>
            <form style="display:flex;gap:8px" onsubmit="return false"><input
                    style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:10px 16px;color:#e8e2d0;font-size:.85rem;outline:none;min-width:220px;font-family:DM Sans,sans-serif"
                    placeholder="your@email.com"><button
                    style="background:#e8820a;color:#000;border:none;border-radius:8px;padding:10px 18px;font-size:.85rem;font-weight:700;cursor:pointer;white-space:nowrap">Subscribe</button>
            </form>
        </div>
        <div
            style="display:flex;justify-content:space-between;align-items:center;padding-top:1.5rem;border-top:1px solid rgba(255,255,255,.06);flex-wrap:wrap;gap:1rem">
            <span style="color:#6b6452;font-size:.8rem">2024 Brand Inc.</span>
            <div style="display:flex;gap:1.5rem"><a href="#"
                    style="color:#6b6452;font-size:.8rem;text-decoration:none">Privacy</a><a href="#"
                    style="color:#6b6452;font-size:.8rem;text-decoration:none">Terms</a></div>
        </div>
    </footer>
</body>

</html>
