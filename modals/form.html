<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            background: #111009;
            font-family: "DM Sans", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh
        }
    </style>
</head>

<body>
    <div
        style="background:#1a1710;border:1px solid #2a2518;border-radius:16px;padding:2rem;max-width:460px;width:90%;box-shadow:0 24px 60px rgba(0,0,0,.8)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem">
            <h2 style="font-size:1.05rem;font-weight:600;color:#e8e2d0">Create account</h2><button
                style="background:rgba(255,255,255,.06);border:none;color:#6b6452;width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:1rem">x</button>
        </div>
        <div style="display:flex;flex-direction:column;gap:1rem;margin-bottom:1.5rem">
            <div><label
                    style="display:block;font-size:.78rem;color:#6b6452;margin-bottom:.4rem;font-family:Space Mono,monospace;letter-spacing:.08em">FULL
                    NAME</label><input
                    style="width:100%;background:rgba(255,255,255,.05);border:1px solid #2a2518;border-radius:8px;padding:10px 14px;color:#e8e2d0;font-size:.88rem;outline:none"
                    placeholder="John Doe"></div>
            <div><label
                    style="display:block;font-size:.78rem;color:#6b6452;margin-bottom:.4rem;font-family:Space Mono,monospace;letter-spacing:.08em">EMAIL</label><input
                    style="width:100%;background:rgba(255,255,255,.05);border:1px solid #2a2518;border-radius:8px;padding:10px 14px;color:#e8e2d0;font-size:.88rem;outline:none"
                    placeholder="you@email.com"></div>
            <div><label
                    style="display:block;font-size:.78rem;color:#6b6452;margin-bottom:.4rem;font-family:Space Mono,monospace;letter-spacing:.08em">PASSWORD</label><input
                    type="password"
                    style="width:100%;background:rgba(255,255,255,.05);border:1px solid #2a2518;border-radius:8px;padding:10px 14px;color:#e8e2d0;font-size:.88rem;outline:none"
                    placeholder="min 8 chars"></div>
        </div><button
            style="width:100%;background:#e8820a;color:#000;border:none;border-radius:8px;padding:12px;font-size:.92rem;font-weight:700;cursor:pointer">Create
            Account</button>
    </div>
</body>

</html>
