<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            background: #111009;
            font-family: "DM Sans", sans-serif;
            min-height: 100vh;
            display: flex;
            min-height: 100vh;
            overflow: hidden
        }
    </style>
</head>

<body>
    <div style="flex:1;background:#0d0b07;padding:2rem;color:#4a4030;font-size:.88rem">Main content area.</div>
    <div style="width:320px;background:#1a1710;border-left:1px solid #2a2518;padding:2rem;min-height:100vh">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem">
            <h2 style="font-size:1rem;font-weight:600;color:#e8e2d0">Settings</h2><button
                style="background:rgba(255,255,255,.06);border:none;color:#6b6452;width:30px;height:30px;border-radius:7px;cursor:pointer;font-size:1.1rem">x</button>
        </div>
        <div style="display:flex;flex-direction:column;gap:.3rem">
            <div
                style="padding:.75rem 1rem;border-radius:8px;background:rgba(232,130,10,.08);border:1px solid rgba(232,130,10,.15);color:#e8820a;font-size:.85rem;cursor:pointer">
                Account</div>
            <div style="padding:.75rem 1rem;border-radius:8px;color:#6b6452;font-size:.85rem;cursor:pointer">
                Notifications</div>
            <div style="padding:.75rem 1rem;border-radius:8px;color:#6b6452;font-size:.85rem;cursor:pointer">Privacy
            </div>
            <div style="padding:.75rem 1rem;border-radius:8px;color:#6b6452;font-size:.85rem;cursor:pointer">Appearance
            </div>
            <div style="padding:.75rem 1rem;border-radius:8px;color:#6b6452;font-size:.85rem;cursor:pointer">Billing
            </div>
        </div>
    </div>
</body>

</html>
