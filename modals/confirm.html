<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            background: #111009;
            font-family: "DM Sans", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh
        }
    </style>
</head>

<body>
    <div
        style="background:#1a1710;border:1px solid #2a2518;border-radius:16px;padding:2rem;max-width:400px;width:90%;box-shadow:0 24px 60px rgba(0,0,0,.8)">
        <div
            style="width:44px;height:44px;border-radius:10px;background:rgba(232,130,10,.1);border:1px solid rgba(232,130,10,.2);display:flex;align-items:center;justify-content:center;margin-bottom:1.2rem">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#e8820a" stroke-width="2">
                <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" />
                <line x1="12" y1="9" x2="12" y2="13" />
                <line x1="12" y1="17" x2="12.01" y2="17" />
            </svg></div>
        <h2 style="font-size:1.05rem;font-weight:600;color:#e8e2d0;margin-bottom:.5rem">Delete this item?</h2>
        <p style="font-size:.88rem;color:#6b6452;line-height:1.65;margin-bottom:1.8rem">This action cannot be undone.
            This will permanently delete the item from your workspace.</p>
        <div style="display:flex;gap:.75rem"><button
                style="flex:1;background:transparent;border:1px solid #2a2518;color:#e8e2d0;border-radius:8px;padding:10px;font-size:.88rem;cursor:pointer">Cancel</button><button
                style="flex:1;background:#c0392b;color:#fff;border:none;border-radius:8px;padding:10px;font-size:.88rem;font-weight:600;cursor:pointer">Delete</button>
        </div>
    </div>
</body>

</html>
