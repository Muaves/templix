<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            background: #050d1a;
            font-family: "DM Sans", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            flex-direction: column
        }
    </style>
</head>

<body>
    <div style="max-width:680px;padding:2rem">
        <div
            style="display:inline-block;background:rgba(0,150,255,.12);border:1px solid rgba(0,150,255,.3);color:#5bb8ff;border-radius:100px;padding:5px 16px;font-size:.72rem;font-family:Space Mono,monospace;letter-spacing:.1em;margin-bottom:2rem">
            Now in beta</div>
        <h1
            style="font-family:Bebas Neue,sans-serif;font-size:clamp(3.5rem,9vw,7rem);color:#fff;line-height:.88;margin-bottom:1.5rem">
            SAAS<br><span style="color:#5bb8ff">LAUNCH</span><br>HERO</h1>
        <p style="font-size:1rem;color:rgba(255,255,255,.4);margin-bottom:2.5rem;line-height:1.65">Clean SaaS hero with
            app UI preview.</p>
        <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-bottom:3rem"><button
                style="background:#0077ff;color:#fff;border:none;border-radius:8px;padding:12px 28px;font-size:.92rem;font-weight:600;cursor:pointer">Start
                Free</button><button
                style="background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.7);border-radius:8px;padding:12px 28px;font-size:.92rem;cursor:pointer">See
                Demo</button></div>
        <div
            style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:1.5rem;max-width:500px;margin:0 auto">
            <div style="height:10px;width:50%;background:rgba(255,255,255,.15);border-radius:5px;margin-bottom:10px">
            </div>
            <div style="height:7px;width:80%;background:rgba(255,255,255,.07);border-radius:4px;margin-bottom:7px">
            </div>
            <div style="height:7px;width:65%;background:rgba(255,255,255,.07);border-radius:4px"></div>
        </div>
    </div>
</body>

</html>
