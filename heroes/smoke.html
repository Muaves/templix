<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            background: #080808;
            font-family: "DM Sans", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            position: relative;
            overflow: hidden
        }
    </style>
</head>

<body>
    <div
        style="position:absolute;inset:0;background:radial-gradient(ellipse 60% 60% at 30% 50%,rgba(200,200,200,.06),transparent 60%),radial-gradient(ellipse 40% 80% at 70% 30%,rgba(150,150,150,.04),transparent 50%)">
    </div>
    <div style="position:relative;z-index:1;max-width:700px;padding:2rem">
        <p
            style="font-family:Space Mono,monospace;font-size:.7rem;letter-spacing:.2em;color:#6b6452;margin-bottom:1.5rem">
            CINEMATIC HERO</p>
        <h1
            style="font-family:Bebas Neue,sans-serif;font-size:clamp(4rem,10vw,8rem);color:#fff;line-height:.88;margin-bottom:1.5rem">
            SMOKE<br>EFFECT</h1>
        <p style="font-size:1rem;color:rgba(255,255,255,.4);margin-bottom:2.5rem;line-height:1.65">A cinematic hero with
            layered radial gradients simulating smoke.</p>
        <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap"><button
                style="background:#e8820a;color:#000;border:none;border-radius:100px;padding:12px 28px;font-size:.92rem;font-weight:700;cursor:pointer">Get
                Started</button><button
                style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#fff;border-radius:100px;padding:12px 28px;font-size:.92rem;cursor:pointer">Learn
                More</button></div>
    </div>
</body>

</html>
