<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            background: #0a0520;
            font-family: "DM Sans", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center
        }
    </style>
</head>

<body>
    <div style="max-width:700px;padding:2rem">
        <div
            style="display:inline-block;background:rgba(180,100,255,.15);border:1px solid rgba(180,100,255,.3);color:#c87dff;border-radius:100px;padding:5px 16px;font-size:.72rem;font-family:Space Mono,monospace;letter-spacing:.1em;margin-bottom:2rem">
            New Release</div>
        <h1
            style="font-family:Bebas Neue,sans-serif;font-size:clamp(4rem,10vw,8rem);color:#fff;line-height:.88;margin-bottom:1.5rem">
            CENTERED<br><span style="color:#c87dff">HERO</span></h1>
        <p style="font-size:1rem;color:rgba(255,255,255,.4);margin-bottom:2.5rem;line-height:1.65">Bold centered layout
            with gradient accents.</p>
        <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap"><button
                style="background:#7c4dff;color:#fff;border:none;border-radius:100px;padding:12px 28px;font-size:.92rem;font-weight:600;cursor:pointer">Get
                Started</button><button
                style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#fff;border-radius:100px;padding:12px 28px;font-size:.92rem;cursor:pointer">Learn
                More</button></div>
    </div>
</body>

</html>
