<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            background: #f9f6f2;
            font-family: "DM Sans", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center
        }
    </style>
</head>

<body>
    <div style="max-width:640px;padding:2rem">
        <h1
            style="font-family:Bebas Neue,sans-serif;font-size:clamp(4rem,10vw,8rem);color:#1a1510;line-height:.88;margin-bottom:1.5rem">
            CLEAN &amp;<br>MINIMAL</h1>
        <p style="font-size:1rem;color:#888;margin-bottom:2.5rem;line-height:1.65">Light background hero focused on
            typography.</p>
        <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap"><button
                style="background:#1a1510;color:#fff;border:none;border-radius:6px;padding:12px 28px;font-size:.9rem;font-weight:600;cursor:pointer">Start
                Now</button><button
                style="background:transparent;border:1px solid #ddd;color:#555;border-radius:6px;padding:12px 28px;font-size:.9rem;cursor:pointer">View
                Work</button></div>
    </div>
</body>

</html>
