<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            background: #e8e0d0;
            font-family: "DM Sans", sans-serif;
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 100vh
        }
    </style>
</head>

<body>
    <div style="display:flex;flex-direction:column;justify-content:center;padding:5rem 4rem;background:#e8e0d0">
        <p
            style="font-family:Space Mono,monospace;font-size:.68rem;letter-spacing:.2em;color:#6b5a48;margin-bottom:1.5rem">
            SPLIT SCREEN</p>
        <h1
            style="font-family:Bebas Neue,sans-serif;font-size:clamp(3rem,5vw,5.5rem);color:#1a1510;line-height:.88;margin-bottom:1.5rem">
            SPLIT<br>SCREEN<br>HERO</h1>
        <p style="font-size:.97rem;color:#6b5a48;margin-bottom:2.5rem;line-height:1.7">Two-column layout with content
            and visual side-by-side.</p><button
            style="background:#1a1510;color:#fff;border:none;border-radius:8px;padding:12px 26px;font-size:.9rem;font-weight:600;cursor:pointer;align-self:flex-start">Explore
            More</button>
    </div>
    <div
        style="background:linear-gradient(135deg,#2a3a6a,#1a2a5a);display:flex;align-items:center;justify-content:center">
        <div
            style="width:60%;aspect-ratio:4/3;background:rgba(255,255,255,.08);border-radius:12px;border:1px solid rgba(255,255,255,.15)">
        </div>
    </div>
</body>

</html>
