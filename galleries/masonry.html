<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            background: #0a0905;
            font-family: "DM Sans", sans-serif;
            min-height: 100vh;
            padding: 3rem
        }
    </style>
</head>

<body>
    <div style="columns:3;column-gap:1rem">
        <div
            style="background:#1a2a4a;border-radius:10px;margin-bottom:1rem;break-inside:avoid;height:180px;border:1px solid rgba(255,255,255,.06)">
        </div>
        <div
            style="background:#2a1a4a;border-radius:10px;margin-bottom:1rem;break-inside:avoid;height:240px;border:1px solid rgba(255,255,255,.06)">
        </div>
        <div
            style="background:#1a3a2a;border-radius:10px;margin-bottom:1rem;break-inside:avoid;height:160px;border:1px solid rgba(255,255,255,.06)">
        </div>
        <div
            style="background:#3a1a1a;border-radius:10px;margin-bottom:1rem;break-inside:avoid;height:220px;border:1px solid rgba(255,255,255,.06)">
        </div>
        <div
            style="background:#1a2a3a;border-radius:10px;margin-bottom:1rem;break-inside:avoid;height:200px;border:1px solid rgba(255,255,255,.06)">
        </div>
        <div
            style="background:#2a3a1a;border-radius:10px;margin-bottom:1rem;break-inside:avoid;height:140px;border:1px solid rgba(255,255,255,.06)">
        </div>
        <div
            style="background:#3a2a1a;border-radius:10px;margin-bottom:1rem;break-inside:avoid;height:260px;border:1px solid rgba(255,255,255,.06)">
        </div>
        <div
            style="background:#1a1a3a;border-radius:10px;margin-bottom:1rem;break-inside:avoid;height:180px;border:1px solid rgba(255,255,255,.06)">
        </div>
        <div
            style="background:#1a2a4a;border-radius:10px;margin-bottom:1rem;break-inside:avoid;height:200px;border:1px solid rgba(255,255,255,.06)">
        </div>
    </div>
</body>

</html>
