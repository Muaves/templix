<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            background: #f9f6f2;
            font-family: "DM Sans", sans-serif;
            min-height: 100vh;
            padding: 3rem
        }
    </style>
</head>

<body>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:1rem">
        <div style="aspect-ratio:1;border-radius:10px;background:#dde8f0;border:1px solid rgba(0,0,0,.06)"></div>
        <div style="aspect-ratio:1;border-radius:10px;background:#e8ddf0;border:1px solid rgba(0,0,0,.06)"></div>
        <div style="aspect-ratio:1;border-radius:10px;background:#ddf0e8;border:1px solid rgba(0,0,0,.06)"></div>
        <div style="aspect-ratio:1;border-radius:10px;background:#f0e8dd;border:1px solid rgba(0,0,0,.06)"></div>
        <div style="aspect-ratio:1;border-radius:10px;background:#e8f0dd;border:1px solid rgba(0,0,0,.06)"></div>
        <div style="aspect-ratio:1;border-radius:10px;background:#f0dddd;border:1px solid rgba(0,0,0,.06)"></div>
        <div style="aspect-ratio:1;border-radius:10px;background:#dde8e8;border:1px solid rgba(0,0,0,.06)"></div>
        <div style="aspect-ratio:1;border-radius:10px;background:#f0f0dd;border:1px solid rgba(0,0,0,.06)"></div>
        <div style="aspect-ratio:1;border-radius:10px;background:#dde0f0;border:1px solid rgba(0,0,0,.06)"></div>
    </div>
</body>

</html>
