<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            background: #f9f6f2;
            font-family: "DM Sans", sans-serif;
            min-height: 100vh;
            padding: 3rem
        }
    </style>
</head>

<body>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem">
        <div style="border-radius:12px;overflow:hidden;background:#ece8e0;border:1px solid rgba(0,0,0,.08)">
            <div style="aspect-ratio:4/3;background:#dde8f0"></div>
            <div style="padding:1rem">
                <p style="font-size:.9rem;font-weight:500;color:#1a1510;margin-bottom:.3rem">Project 1</p>
                <p style="font-size:.78rem;color:#888">Brand Identity</p>
            </div>
        </div>

        <div style="border-radius:12px;overflow:hidden;background:#ece8e0;border:1px solid rgba(0,0,0,.08)">
            <div style="aspect-ratio:4/3;background:#f0e8dd"></div>
            <div style="padding:1rem">
                <p style="font-size:.9rem;font-weight:500;color:#1a1510;margin-bottom:.3rem">Project 4</p>

</html>
