<!DOCTYPE html>
<html>

<head>

        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            background: #0d1525;
            font-family: "DM Sans", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            padding: 40px
        }
    </style>
</head>

<body>
    <nav
        style="width:100%;backdrop-filter:blur(14px);background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:14px;padding:14px 24px;display:flex;align-items:center;justify-content:space-between">
        <span style="font-family:Space Mono,monospace;font-weight:700;color:#fff">BRAND.</span>
        <div style="display:flex;gap:24px"><a href="#"
                style="font-size:.85rem;color:rgba(255,255,255,.6);text-decoration:none">Home</a><a href="#"
                style="font-size:.85rem;color:rgba(255,255,255,.6);text-decoration:none">About</a><a href="#"
                style="font-size:.85rem;color:rgba(255,255,255,.6);text-decoration:none">Work</a><a href="#"
                style="font-size:.85rem;color:rgba(255,255,255,.6);text-decoration:none">Contact</a></div><button
            style="background:#e8820a;color:#000;border:none;border-radius:8px;padding:8px 18px;font-size:.82rem;font-weight:700;cursor:pointer">Get
            Started</button>
    </nav>
</body>

</html>
