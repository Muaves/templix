    <style>
        *,

<body>

        <span style="font-family:Space Mono,monospace;font-weight:700;font-size:.9rem;color:#00ffc8">CYBERX</span>
        <div style="display:flex;gap:24px"><a href="#"
                style="font-size:.8rem;color:rgba(0,255,200,.5);text-decoration:none">Hub</a><a href="#"
                style="font-size:.8rem;color:rgba(0,255,200,.5);text-decoration:none">Market</a><a href="#"
                style="font-size:.8rem;color:rgba(0,255,200,.5);text-decoration:none">Labs</a></div><button

</html>
