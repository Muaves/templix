<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            background: #1a0a3a;
            font-family: "DM Sans", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            padding: 40px
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff
        }

        nav {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 24px;
            background: rgba(255, 255, 255, .04);
            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 12px;
            backdrop-filter: blur(15px);
            overflow: -moz-hidden-unscrollable;
             position: relative;
        }

        nav a {
            font-size: .82rem;
            color: rgba(255, 255, 255, .65);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 4px;
            justify-content: center;
            padding: 8px 12px;
            border-radius: 8px;
            transition: background 0.3s, color 0.3s;
        }

        nav a:hover {
            background: rgba(255, 255, 255, .1);
            color: #fff;
        }
        .navbardots p{
            display: none;
             transition: opacity 0.3s;
             opacity: 0;
        }

        .navbardots:hover p{
            display: block;
            position: absolute;
            background: rgb(45, 29, 85);
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            top: 50px;
            right: 20px;
            backdrop-filter: blur(15px);
            opacity: 1;
        }
    </style>
</head>

<body>
