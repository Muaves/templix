<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

  .nav-flip {
    height: 62px;
    background: #0f0f0f;
    border: 3px solid #1e1e1e;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  }

  .nav-flip__logo {
    font-family: inherit;
    font-size: 17px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 3px;
    text-decoration: none;
  }

  .nav-flip__links {
    list-style: none;
    display: flex;
    gap: 2px;
    margin: 0;
    padding: 0;
  }

  .nav-flip__links li {
    perspective: 400px;
  }

  .nav-flip__links a {
    display: block;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 600;
    color: #555;
    text-decoration: none;
    border-radius: 8px;
    position: relative;
    transition: color 0.3s, transform 0.4s cubic-bezier(0.23, 1.5, 0.32, 1);
    transform-style: preserve-3d;
    border: 1px solid #1e1e1e;
  }

  .nav-flip__links a::after {
    content: attr(data-label);
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    background: #1a1a1a;
    border: 1px solid #2e2e2e;
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    transform: rotateX(-90deg) translateY(110%);
    backface-visibility: hidden;
    transition: transform 0.4s cubic-bezier(0.23, 1.5, 0.32, 1);
  }

  .nav-flip__links a:hover {
    color: transparent;
    transform: rotateX(80deg) translateY(-40%);
  }

  .nav-flip__cta {
    background: #fff;
    color: #000;
    border: none;
    padding: 9px 20px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
  }

  .nav-flip__cta:hover {
    background: #e0e0e0;
    transform: scale(1.03);
  }
</style>
</head>
<body style="background:#080808; padding: 40px;">

  <nav class="nav-flip">
    <a href="#" class="nav-flip__logo">VAULT</a>
    <ul class="nav-flip__links">
      <li><a href="#" data-label="Home">Home</a></li>
      <li><a href="#" data-label="Work">Work</a></li>
      <li><a href="#" data-label="About">About</a></li>
      <li><a href="#" data-label="Blog">Blog</a></li>
      <li><a href="#" data-label="Contact">Contact</a></li>
    </ul>
    <button class="nav-flip__cta">Join now</button>
  </nav>

</body>
</html>
